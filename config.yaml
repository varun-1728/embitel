# ==========================================================================
# Embitel Competitor Intelligence Agent — configuration
# Edit this file to change who/what the agent tracks. No code changes needed.
# ==========================================================================

# The company whose competitors we track (used to frame the LLM prompts).
company:
  name: "Embitel"
  description: >
    Automotive software and product engineering services company. Focus areas:
    embedded systems, automotive electronics, EV/e-mobility, ADAS, connected
    vehicles, AUTOSAR, functional safety (ISO 26262), IoT, and digital commerce.

# Competitors to monitor. Add/remove freely.
# `aliases` help the agent recognise the company in questions and search results.
competitors:
  - name: "KPIT Technologies"
    aliases: ["KPIT"]
  - name: "Tata Elxsi"
    aliases: ["Elxsi"]
  - name: "L&T Technology Services"
    aliases: ["LTTS", "LNT Technology"]
  - name: "Cyient"
    aliases: []
  - name: "HCLTech"
    aliases: ["HCL Technologies", "HCL ERS"]
  - name: "Bosch Global Software Technologies"
    aliases: ["BGSW", "Bosch Engineering"]
  - name: "Harman"
    aliases: ["Harman International"]
  - name: "Luxoft"
    aliases: ["DXC Luxoft"]
  - name: "Tata Technologies"
    aliases: []

# What to track. These drive the research prompts and report sections.
categories:
  - key: "technology"
    label: "New Technologies & Products"
  - key: "hiring"
    label: "Hiring & Headcount Trends"
  - key: "acquisition"
    label: "Acquisitions & M&A"
  - key: "partnership"
    label: "Partnerships & Alliances"
  - key: "other"
    label: "Other Notable Developments"

# How far back the research/refresh looks for "recent" news.
research:
  lookback_days: 14
  # Max findings the LLM is asked to return per competitor per refresh.
  max_findings_per_competitor: 8

# Weekly report settings.
report:
  # Recipients of the weekly email (their Gmail inboxes).
  recipients:
    - "varunreddy1728@gmail.com"
    - "varun.24bcs10009@sst.scaler.com"
  subject_prefix: "[Embitel Competitor Watch]"
  # Only include findings from the last N days in the weekly report.
  window_days: 7

# How often the automatic report runs. The installer reads this.
schedule:
  # interval: daily | weekly | monthly   (default weekly)
  interval: "weekly"
  # Time of day to run, 24h local time.
  time: "08:00"
  # For interval=weekly only: which day. Mon Tue Wed Thu Fri Sat Sun
  day: "Mon"
  # For interval=monthly only: day of month (1-28).
  day_of_month: 1
  # Advanced: raw systemd OnCalendar string. If set (non-empty), it overrides
  # everything above. e.g. "*-*-* 06:00:00" or "Fri *-*-* 09:30:00"
  oncalendar: ""

# LLM model per provider (override defaults if you like).
models:
  gemini: "gemini-2.5-flash-lite"
  claude: "claude-sonnet-5"
  groq: "llama-3.3-70b-versatile"
